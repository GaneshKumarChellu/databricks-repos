bundle:
  name: dabs_tutorial
  uuid: 60a244d0-da1a-4288-9610-79c86d7e73f6

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: dbc-7bd5e1fc-b777.cloud.databricks.com
    permissions:
      - group_name: developers
        level: CAN_MANAGE
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false
  prod:
    mode: production
    workspace:
      host: dbc-7bd5e1fc-b777.cloud.databricks.com
      root_path: /Workspace/PROD/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: ganeshkumar.chellu@gmail.com
        level: CAN_MANAGE
      - group_name: admins
        level: CAN_RUN
